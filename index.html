<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOTAMARU | ELITE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #e0e0e0;
            --glow: 0 0 15px rgba(255, 255, 255, 0.8);
            --bg-dark: #000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-dark);
            color: var(--primary);
            overflow: hidden;
        }

        #canvas-bg { position: fixed; inset: 0; z-index: -1; }

        /* НОВАЯ ЗАГРУЗКА */
        #loader {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 5000;
        }
        .scanline {
            width: 300px; height: 2px; background: #fff;
            box-shadow: var(--glow); position: relative; overflow: hidden;
        }
        .scanline::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%; background: #000; animation: scan 1.5s infinite;
        }
        @keyframes scan { 100% { left: 100%; } }

        /* МЕРЦАЮЩИЙ ТЕКСТ */
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }

        #captcha-gate {
            position: fixed; inset: 0; background: #000; z-index: 4000;
            display: none; justify-content: center; align-items: center;
        }

        .main-content {
            max-width: 1200px; margin: 0 auto; padding: 40px 20px;
            opacity: 0; display: none;
        }
        .is-ready { opacity: 1; display: block; transition: 2s; }

        .handwritten-glow {
            font-family: 'Caveat', cursive; font-size: 5rem;
            color: #fff; text-shadow: var(--glow); text-align: center;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; margin-top: 50px; }
        .card { background: rgba(0, 0, 0, 0.8); border: 1px solid #222; padding: 40px; transition: 0.4s; }
        .card:hover { border-color: #fff; transform: translateY(-5px); box-shadow: var(--glow); }

        .price { font-size: 1.5rem; margin: 20px 0; color: #fff; font-weight: bold; }
        ul { list-style: none; margin-bottom: 30px; }
        li { margin-bottom: 12px; color: #777; font-size: 0.9rem; }
        li::before { content: "» "; color: #fff; }

        .buy-button {
            display: block; width: 100%; padding: 20px; margin-top: 10px;
            border: 1px solid #fff; color: #fff; text-decoration: none;
            text-align: center; font-size: 0.8rem; font-weight: bold; transition: 0.3s;
        }
        .buy-button:hover { background: #fff; color: #000; box-shadow: var(--glow); }

        .lang-btn { background: none; border: none; color: #444; margin-left: 20px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div id="loader">
        <div class="blink" style="letter-spacing: 10px; margin-bottom: 20px;">YOTAMARU_SECURE_BOOT</div>
        <div class="scanline"></div>
    </div>

    <div id="captcha-gate">
        <div style="border-left: 2px solid #fff; padding: 20px; background: #050505;">
            <div id="term-text" style="color: #fff; font-size: 0.9rem; min-height: 60px;"></div>
            <button id="auth-btn" class="buy-button" style="display: none; width: 200px;" onclick="unlock()">INITIATE</button>
        </div>
    </div>

    <div class="main-content" id="ui">
        <div style="text-align: right;">
            <button class="lang-btn active" onclick="changeLang('ru', this)">RU</button>
            <button class="lang-btn" onclick="changeLang('en', this)">EN</button>
            <button class="lang-btn" onclick="changeLang('kz', this)">KZ</button>
        </div>

        <header>
            <h1 class="handwritten-glow blink">Yotamaru</h1>
            <p id="sub-title" style="letter-spacing: 5px; font-size: 0.7rem; opacity: 0.5; text-align: center; margin-top: 15px;"></p>
        </header>

        <div class="grid">
            <div class="card">
                <h2 id="p1-title" style="font-family: 'Caveat'; font-size: 2.5rem;"></h2>
                <div class="price">3000₸ | 550₽ | 1250G</div>
                <ul id="p1-list"></ul>
                <a href="#" class="buy-button" onclick="confirmBuy(event)">TELEGRAM STARS</a>
                <a href="#" class="buy-button" onclick="confirmBuy(event)">OTHER METHODS</a>
            </div>
            <div class="card">
                <h2 id="p2-title" style="font-family: 'Caveat'; font-size: 2.5rem;"></h2>
                <div class="price">4500₸ | 750₽ | 1750G</div>
                <ul id="p2-list"></ul>
                <a href="#" class="buy-button" onclick="confirmBuy(event)">TELEGRAM STARS</a>
                <a href="#" class="buy-button" onclick="confirmBuy(event)">OTHER METHODS</a>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            ru: { sub: "ПРЕМИАЛЬНАЯ ЭМУЛЯЦИЯ И ОПТИМИЗАЦИЯ", p1t: "Yotamaru Эмулятор", p2t: "Оптимизация ПК", p1l: ["Кастомный интерфейс", "Без рекламы", "Стабилизация FPS", "HWID привязка", "Фикс сенсы"], p2l: ["Все игры", "CS 2 / Valorant", "Снижение задержки", "Стабильный пинг", "Elite поддержка"], term: ">> ЗАГРУЗКА ПРОТОКОЛОВ...\n>> ПРОВЕРКА ОКРУЖЕНИЯ: БЕЗОПАСНО\n>> ДОСТУП РАЗРЕШЕН.", confirm: "Вы точно хотите купить этот товар?" },
            en: { sub: "PREMIUM EMULATION & OPTIMIZATION", p1t: "Yotamaru Emulator", p2t: "PC Optimization", p1l: ["Custom UI", "No Ads", "FPS Stabilization", "HWID Lock", "Sensi Fix"], p2l: ["All Games", "CS 2 / Valorant", "Lag Reduction", "Stable Latency", "Elite Support"], term: ">> LOADING PROTOCOLS...\n>> CHECKING ENVIRONMENT: SAFE\n>> ACCESS GRANTED.", confirm: "Are you sure you want to buy this product?" },
            kz: { sub: "ПРЕМИУМ ЭМУЛЯЦИЯ ЖӘНЕ ОПТИМИЗАЦИЯ", p1t: "Yotamaru Эмуляторы", p2t: "ДК Оптимизациясы", p1l: ["Жеке интерфейс", "Жарнамасыз", "FPS тұрақтандыру", "HWID қорғанысы", "Сенса түзету"], p2l: ["Барлық ойындар", "CS 2 / Valorant", "Кешігуді азайту", "Тұрақты пинг", "Техникалық қолдау"], term: ">> ЖҮЙЕ ЖҮКТЕЛУДЕ...\n>> ТЕКСЕРУ: ҚАУІПСІЗ\n>> РҰҚСАТ БЕРІЛДІ.", confirm: "Бұл тауарды сатып алғыңыз келетініне сенімдісіз бе?" }
        };

        let currentLang = 'ru';

        function changeLang(lang, btn) {
            currentLang = lang;
            if(btn) { document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            const t = translations[lang];
            document.getElementById('sub-title').innerText = t.sub;
            document.getElementById('p1-title').innerText = t.p1t;
            document.getElementById('p2-title').innerText = t.p2t;
            const updateList = (id, items) => {
                const el = document.getElementById(id); el.innerHTML = '';
                items.forEach(i => { const li = document.createElement('li'); li.innerText = i; el.appendChild(li); });
            };
            updateList('p1-list', t.p1l);
            updateList('p2-list', t.p2l);
        }
        changeLang('ru');

        function confirmBuy(e) {
            e.preventDefault();
            if (confirm(translations[currentLang].confirm)) {
                window.location.href = "https://t.me/YotamaruShopBot";
            }
        }

        // ЗАГРУЗКА
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('captcha-gate').style.display = 'flex';
            let i = 0; const txt = translations.ru.term;
            function run() {
                if(i < txt.length) { document.getElementById('term-text').innerText += txt.charAt(i); i++; setTimeout(run, 40); }
                else { document.getElementById('auth-btn').style.display = 'block'; }
            }
            run();
        }, 2500);

        function unlock() {
            document.getElementById('captcha-gate').style.display = 'none';
            document.getElementById('ui').classList.add('is-ready');
            document.body.style.overflow = 'auto';
        }

        // НОВЫЕ ЖИВЫЕ ОБОИ (ПЛЫВУЩИЕ ЛИНИИ)
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<25; i++) lines.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*2+1, l: Math.random()*100+50 });
        }

        function anim() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
            lines.forEach(line => {
                ctx.beginPath(); ctx.moveTo(line.x, line.y); ctx.lineTo(line.x, line.y + line.l); ctx.stroke();
                line.y += line.v; if(line.y > canvas.height) { line.y = -line.l; line.x = Math.random()*canvas.width; }
            });
            requestAnimationFrame(anim);
        }
        init(); anim(); window.addEventListener('resize', init);
    </script>
</body>
</html>
