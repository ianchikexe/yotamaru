<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOTAMARU | ELITE</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #e0e0e0;
            --glow-color: rgba(255, 255, 255, 0.6);
            --bg-dark: #020202;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-dark);
            color: var(--primary);
            overflow: hidden;
        }

        #canvas-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #000;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }
        .load-title { font-size: 1.5rem; letter-spacing: 5px; color: #fff; margin-bottom: 20px; }
        .bar-container { width: 200px; height: 2px; background: #111; }
        #load-bar { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 10px #fff; transition: 0.1s; }

        #captcha-gate {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 4000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .terminal-window { width: 90%; max-width: 600px; padding: 30px; border-left: 2px solid #fff; background: #050505; }
        .typewriter-box { min-height: 80px; font-size: 0.9rem; color: #fff; margin-bottom: 20px; white-space: pre-wrap; }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            opacity: 0;
            display: none;
        }
        .is-ready { opacity: 1; display: block; transition: 1.5s; }

        .handwritten-glow {
            font-family: 'Caveat', cursive;
            font-size: 4.5rem;
            color: #fff;
            text-shadow: 0 0 20px #fff;
            text-align: center;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid #111; padding: 30px; transition: 0.4s; }
        .card:hover { border-color: #fff; background: #080808; }
        
        .price { font-size: 1.3rem; margin: 15px 0; color: #fff; font-weight: bold; }
        ul { list-style: none; margin-bottom: 25px; }
        li { margin-bottom: 10px; color: #666; font-size: 0.85rem; }
        li::before { content: "> "; color: #fff; }

        .buy-button {
            display: block; width: 100%; padding: 15px; margin-top: 10px;
            border: 1px solid #fff; color: #fff; text-decoration: none;
            text-align: center; font-size: 0.75rem; font-weight: bold; transition: 0.3s;
        }
        .buy-button:hover { background: #fff; color: #000; }

        .lang-switcher { text-align: right; margin-bottom: 20px; }
        .lang-btn { background: none; border: none; color: #444; margin-left: 15px; cursor: pointer; font-family: inherit; }
        .lang-btn.active { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div id="loader">
        <div class="load-title">YOTAMARU_CORE</div>
        <div class="bar-container"><div id="load-bar"></div></div>
    </div>

    <div id="captcha-gate">
        <div class="terminal-window">
            <div class="typewriter-box" id="term-text"></div>
            <button id="auth-btn" class="buy-button" style="width: 200px; display: none;" onclick="unlock()">ACCESS GRANTED</button>
        </div>
    </div>

    <div class="main-content" id="ui">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="changeLang('ru', this)">RU</button>
            <button class="lang-btn" onclick="changeLang('en', this)">EN</button>
            <button class="lang-btn" onclick="changeLang('kz', this)">KZ</button>
        </div>

        <header>
            <h1 class="handwritten-glow">Yotamaru</h1>
            <p style="letter-spacing: 5px; font-size: 0.6rem; opacity: 0.4; text-align: center;" id="sub-title">PREMIUM EMULATION & OPTIMIZATION</p>
        </header>

        <div class="grid">
            <div class="card">
                <h2 id="p1-title" style="font-family: 'Caveat'; font-size: 2rem;">Yotamaru Emulator</h2>
                <div class="price">3000₸ | 550₽ | 1250G</div>
                <ul id="p1-list"></ul>
                <a href="https://t.me/YotamaruShopBot" class="buy-button">TELEGRAM STARS</a>
                <a href="https://t.me/YotamaruShopBot" class="buy-button">OTHER METHODS</a>
            </div>
            <div class="card">
                <h2 id="p2-title" style="font-family: 'Caveat'; font-size: 2rem;">PC Optimization</h2>
                <div class="price">4500₸ | 750₽ | 1750G</div>
                <ul id="p2-list"></ul>
                <a href="https://t.me/YotamaruShopBot" class="buy-button">TELEGRAM STARS</a>
                <a href="https://t.me/YotamaruShopBot" class="buy-button">OTHER METHODS</a>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            ru: { sub: "ПРЕМИАЛЬНАЯ ЭМУЛЯЦИЯ И ОПТИМИЗАЦИЯ", p1t: "Yotamaru Эмулятор", p2t: "Оптимизация ПК", p1l: ["Кастомный интерфейс", "Без рекламы", "Стабилизация FPS", "HWID привязка", "Фикс сенсы"], p2l: ["Все игры", "CS 2 / Valorant", "Снижение задержки", "Стабильный пинг", "Техподдержка"], term: ">> SYSTEM: ИНИЦИАЛИЗАЦИЯ...\n>> STATUS: ВСЕ СИСТЕМЫ В НОРМЕ\n>> ДОСТУП РАЗРЕШЕН." },
            en: { sub: "PREMIUM EMULATION & OPTIMIZATION", p1t: "Yotamaru Emulator", p2t: "PC Optimization", p1l: ["Custom UI", "No Ads", "FPS Stabilization", "HWID Lock", "Sensi Fix"], p2l: ["All Games", "CS 2 / Valorant", "Lag Reduction", "Stable Latency", "Elite Support"], term: ">> SYSTEM: INITIALIZING...\n>> STATUS: ALL SYSTEMS GO\n>> ACCESS GRANTED." },
            kz: { sub: "ПРЕМИУМ ЭМУЛЯЦИЯ ЖӘНЕ ОПТИМИЗАЦИЯ", p1t: "Yotamaru Эмуляторы", p2t: "ДК Оптимизациясы", p1l: ["Жеке интерфейс", "Жарнамасыз", "FPS тұрақтандыру", "HWID қорғанысы", "Сенса түзету"], p2l: ["Барлық ойындар", "CS 2 / Valorant", "Кешігуді азайту", "Тұрақты пинг", "Техникалық қолдау"], term: ">> ЖҮЙЕ: ІСКЕ ҚОСУ...\n>> СТАТУС: БАРЛЫҚ ЖҮЙЕ ДАЙЫН\n>> РҰҚСАТ БЕРІЛДІ." }
        };

        function changeLang(lang, btn) {
            if(btn) { document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            const t = translations[lang];
            document.getElementById('sub-title').innerText = t.sub;
            document.getElementById('p1-title').innerText = t.p1t;
            document.getElementById('p2-title').innerText = t.p2t;
            const updateList = (id, items) => {
                const el = document.getElementById(id);
                el.innerHTML = '';
                items.forEach(i => { const li = document.createElement('li'); li.innerText = i; el.appendChild(li); });
            };
            updateList('p1-list', t.p1l);
            updateList('p2-list', t.p2l);
        }
        changeLang('ru');

        // ЗАГРУЗКА
        let w = 0;
        const loadInt = setInterval(() => {
            w += Math.random() * 15;
            document.getElementById('load-bar').style.width = Math.min(w, 100) + '%';
            if(w >= 100) {
                clearInterval(loadInt);
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('captcha-gate').style.display = 'flex';
                    typeText();
                }, 500);
            }
        }, 100);

        function typeText() {
            let i = 0; const txt = translations.ru.term;
            function run() {
                if(i < txt.length) { document.getElementById('term-text').innerHTML += txt.charAt(i); i++; setTimeout(run, 30); }
                else { document.getElementById('auth-btn').style.display = 'block'; }
            }
            run();
        }

        function unlock() {
            document.getElementById('captcha-gate').style.display = 'none';
            document.getElementById('ui').classList.add('is-ready');
            document.body.style.overflow = 'auto';
        }

        // ЖИВЫЕ ОБОИ
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let pts = [];
        const mouse = { x: null, y: null };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        class Pt {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
            }
            draw() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.arc(this.x, this.y, 1, 0, Math.PI*2); ctx.fill();
            }
        }

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<80; i++) pts.push(new Pt());
        }

        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            pts.forEach(p => {
                p.draw();
                let dx = mouse.x - p.x; let dy = mouse.y - p.y;
                let d = Math.sqrt(dx*dx + dy*dy);
                if(d < 150) {
                    ctx.strokeStyle = `rgba(255,255,255,${1 - d/150})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
                }
            });
            requestAnimationFrame(anim);
        }
        init(); anim();
    </script>
</body>
</html>
